<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cahaya Senja · CEO Dashboard</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<style>
:root{
  --bg:#F6EFE2; --navy:#101a33; --navy2:#1b2c52;
  --ink:#1a1205; --heading:#101a33; --muted:#8a7a5a; --slate:#3a4860;
  --gold:#E0930A; --gold-l:#FFB11D; --gold-lbl:#b5740a; --orange:#FD6212;
  --red:#C80807; --green:#1f9d4d;
  --card:#fff; --border:#ECE3D2; --soft:#fff6e3; --soft2:#ffe9c9;
  --nav:#fbf6ec; --line:#f4ecdc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;padding-bottom:48px;min-height:100vh}
.fd{font-family:'Fredoka','Plus Jakarta Sans',sans-serif}
.wrap{max-width:1180px;margin:0 auto}
.scroll::-webkit-scrollbar{height:6px;width:6px}
.scroll::-webkit-scrollbar-thumb{background:#d9c8a8;border-radius:99px}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
section{animation:rise .4s ease both}

/* header */
header{background:linear-gradient(120deg,#101a33 0%,#1b2c52 52%,#5a3a17 130%);color:#fff;
  padding:18px clamp(16px,4vw,40px) 20px;position:relative;overflow:hidden}
header .glow{position:absolute;top:-60px;right:-30px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,#FFB11D55,transparent 68%);pointer-events:none}
.hrow{display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;position:relative}
.logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#FFB11D,#FD6212);
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(253,98,18,.4);flex:none}
.logo span{font-weight:700;font-size:22px;color:#101a33}
.brandname{font-weight:600;font-size:21px;letter-spacing:-.01em;line-height:1;white-space:nowrap}
.brandsub{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#FFD27A;font-weight:600;margin-top:3px}
.greet{font-size:13.5px;font-weight:700;white-space:nowrap}
.greetsub{font-size:11.5px;color:#b8c2d6}
.toggle{display:flex;background:rgba(255,255,255,.1);border-radius:999px;padding:3px;gap:2px}
.toggle button{border:none;font-size:12.5px;padding:7px 15px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:600;background:transparent;color:#c9d3e6}
.toggle button.on{background:#fff;color:#101a33;font-weight:700}

/* cockpit strip */
.cockpit{background:#101a33;padding:0 clamp(16px,4vw,40px) 16px}
.cockpit .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi-dark{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 14px}
.kpi-dark .l{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#9fb0cc;font-weight:600}
.kpi-dark .v{font-size:20px;font-weight:800;color:#fff;margin-top:4px;letter-spacing:-.02em}
.kpi-dark .s{font-size:11px;color:#c9d3e6;margin-top:2px}

/* nav */
nav{background:var(--nav);border-bottom:1px solid #e7dcc4;position:sticky;top:0;z-index:20;box-shadow:0 4px 14px rgba(80,55,15,.05)}
nav .inner{display:flex;gap:6px;overflow-x:auto;padding:9px clamp(12px,4vw,40px)}
nav button{border:none;font-size:13.5px;padding:9px 16px;border-radius:999px;cursor:pointer;font-family:inherit;
  font-weight:600;background:transparent;color:#7a6a48;white-space:nowrap;flex:none}
nav button.on{background:var(--gold);color:#fff;font-weight:700;box-shadow:0 6px 14px rgba(224,147,10,.28)}

main{padding:clamp(16px,3.5vw,30px) clamp(14px,4vw,40px)}
.eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-lbl);font-weight:700}
h2.sec{font-size:24px;font-weight:800;margin:4px 0 0;color:var(--heading);letter-spacing:-.02em}
.sec-head{margin-bottom:16px}
.gridfit{display:grid;gap:14px}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 10px 26px rgba(60,40,10,.06)}
.card-accent{background:var(--soft);border:1px solid #f3dca8;border-radius:18px;padding:18px;box-shadow:0 10px 26px rgba(220,150,30,.1)}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600}
.kpi .v{font-size:26px;font-weight:800;margin:6px 0 2px;letter-spacing:-.02em}
.kpi .row{display:flex;align-items:center;gap:8px}
.kpi .s{font-size:12px;color:var(--muted)}
.delta{font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.d-up{color:var(--green);background:#E8F7EC}
.d-down{color:var(--red);background:#FDEBEA}
.d-flat{color:var(--muted);background:#f0e7d4}

/* brief */
.brief-hero{background:linear-gradient(135deg,#fff6e3 0%,#ffe9c9 60%,#ffdca6 100%);border:1px solid #f3dca8;
  border-radius:24px;padding:clamp(20px,3vw,32px);box-shadow:0 16px 40px rgba(220,150,30,.14);position:relative;overflow:hidden}
.brief-hero .glow{position:absolute;top:-50px;right:-20px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,#FFB11D88,transparent 70%)}
.pill-dark{display:inline-flex;align-items:center;gap:8px;background:#101a33;color:#FFD27A;font-size:11.5px;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 13px;border-radius:999px}
.brief-hero h1{font-weight:600;font-size:clamp(24px,4vw,34px);margin:14px 0 4px;color:#1a1205;letter-spacing:-.01em;line-height:1.12}
.brief-body{font-size:clamp(15px,1.9vw,17px);line-height:1.7;color:#2a2113;margin:16px 0 0;max-width:780px;white-space:pre-wrap}
.prio{background:#fff;border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:16px;padding:16px 18px;
  display:flex;align-items:center;gap:15px;box-shadow:0 8px 22px rgba(60,40,10,.06)}
.prio .num{width:34px;height:34px;border-radius:50%;background:#101a33;color:#FFD27A;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex:none}
.prio .t{font-size:15px;font-weight:700;color:#1a1205;line-height:1.35}
.prio .w{font-size:12px;color:var(--muted);margin-top:2px}
.prio .cta{background:#fdf2da;color:#9a6a0a;border:1px solid #f0d9a4;font-weight:700;font-size:12.5px;padding:8px 14px;
  border-radius:999px;cursor:pointer;white-space:nowrap;flex:none;font-family:inherit}
.note-dark{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#101a33;border-radius:16px;padding:14px 18px;color:#c9d3e6;font-size:13.5px}

/* tables */
.tbl{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 26px rgba(60,40,10,.06);overflow:hidden}
.tbl .th,.tbl .tr{display:grid;gap:10px;padding:13px 18px;align-items:center}
.tbl .th{background:var(--nav);border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);font-weight:700}
.tbl .tr{border-bottom:1px solid var(--line);font-size:14px}
.tbl .tr:last-child{border-bottom:none}
.chip{font-size:12px;font-weight:700;padding:3px 8px;border-radius:999px}

.alert{border-radius:15px;padding:15px 18px;display:flex;gap:14px;align-items:flex-start}
.alert .dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.alert .t{font-weight:800;font-size:14.5px;color:#1a1205}
.alert .m{font-size:13px;color:#5a5240;margin-top:3px;line-height:1.45}
.tag{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px}

.empty{color:var(--muted);font-size:13px;padding:18px;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#101a33;color:#fff;
  padding:12px 18px;border-radius:12px;font-size:13px;z-index:99;opacity:0;transition:.3s;max-width:90%}
.toast.show{opacity:1}
.upload{border:2px dashed #d9c8a8;border-radius:16px;padding:22px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer}
.upload.drag{border-color:var(--gold);background:#fff6e3;color:var(--gold-lbl)}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:none;font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:999px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="glow"></div>
  <div class="wrap hrow">
    <div style="display:flex;align-items:center;gap:13px;flex:none">
      <div class="logo"><span class="fd">C</span></div>
      <div>
        <div class="fd brandname">Cahaya Senja</div>
        <div class="brandsub">CEO Dashboard</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="text-align:right;line-height:1.3">
        <div class="greet" id="greeting">Selamat datang</div>
        <div class="greetsub" id="dateLong">—</div>
      </div>
      <div class="toggle">
        <button id="tgBrief" onclick="setLayout('brief')">Brief-first</button>
        <button id="tgCockpit" onclick="setLayout('cockpit')">Cockpit</button>
      </div>
      <button class="btn-ghost" onclick="document.getElementById('file').click()">⬆ Upload</button>
      <button class="btn-ghost" id="refreshBtn" onclick="refresh()">↻</button>
      <button class="btn-ghost" onclick="resetData()" title="Hapus semua data (termasuk data contoh)">🗑</button>
    </div>
  </div>
</header>
<input type="file" id="file" accept=".csv,.xlsx,.xls" multiple style="display:none">

<div class="cockpit" id="cockpit" style="display:none"><div class="wrap grid scroll" id="cockpitGrid"></div></div>

<nav><div class="wrap inner scroll" id="nav"></div></nav>

<main class="wrap" id="main"><div class="empty">Memuat dashboard…</div></main>

<div class="toast" id="toast"></div>

<div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(16,26,51,.78);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:18px;padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.45)">
    <div id="ovTitle" style="font-size:18px;font-weight:800;color:#101a33;margin-bottom:12px"></div>
    <div id="ovBody" style="font-size:13.5px;color:#3a4860;line-height:1.65;white-space:pre-wrap;max-height:50vh;overflow:auto"></div>
    <button id="ovClose" onclick="document.getElementById('overlay').style.display='none'" style="display:none;margin-top:16px;background:#E0930A;color:#fff;border:none;font-weight:700;padding:11px 20px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:14px">Tutup & lihat dashboard</button>
  </div>
</div>

<script>
// ───────── helpers ─────────
const $ = id => document.getElementById(id);
function rp(n){ return 'Rp ' + Math.round(Number(n)||0).toLocaleString('id-ID'); }
function rpJt(n){
  n = Number(n)||0; const a = Math.abs(n);
  if(a>=1e9) return 'Rp ' + (n/1e9).toLocaleString('id-ID',{maximumFractionDigits:1}) + ' M';
  if(a>=1e6) return 'Rp ' + (n/1e6).toLocaleString('id-ID',{maximumFractionDigits:1}) + ' jt';
  if(a>=1e3) return 'Rp ' + Math.round(n/1e3) + ' rb';
  return 'Rp ' + Math.round(n);
}
function pctTxt(p){ return Math.abs(p).toString().replace('.', ','); }
function deltaChip(pct, goodUp=true){
  if(pct===null||pct===undefined) return '<span class="delta d-flat">–</span>';
  const good = pct===0 ? null : (goodUp ? pct>0 : pct<0);
  const cls = pct===0 ? 'd-flat' : (good ? 'd-up' : 'd-down');
  const arr = pct>0 ? '▲' : (pct<0 ? '▼' : '–');
  return `<span class="delta ${cls}">${arr} ${pctTxt(pct)}%</span>`;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.className='toast',3000); }

const CH_COLORS = {'Shopee':'#EE4D2D','Tokopedia':'#42B549','TikTok Shop':'#111111','Lazada':'#0F146D'};
const CH_INITIAL = {'Shopee':'S','Tokopedia':'T','TikTok Shop':'TT','Lazada':'L'};

const NAV = [
  ['brief','Daily Brief'],['exec','Ringkasan'],['market','Marketplace'],['product','Produk'],
  ['ads','Iklan'],['inv','Inventory'],['cash','Cashflow'],['alert','Alert'],['blueprint','Blueprint'],
];

let DATA = null;
let layout = 'brief';
let tab = 'brief';

// ───────── load ─────────
async function load(){
  try{
    const r = await fetch('/api/overview');
    DATA = await r.json();
    const e = DATA.executive || {};
    $('greeting').textContent = 'Selamat pagi, Owner Cahaya Senja';
    $('dateLong').textContent = 'Data per ' + (e.data_date || '-');
    renderNav(); renderCockpit(); render();
  }catch(err){ console.error(err); $('main').innerHTML = '<div class="empty">Gagal memuat data. Coba Refresh.</div>'; }
}

function setLayout(l){ layout = l; $('tgBrief').className = l==='brief'?'on':''; $('tgCockpit').className = l==='cockpit'?'on':''; renderCockpit(); }
function setTab(t){ tab = t; renderNav(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

function renderNav(){
  $('nav').innerHTML = NAV.map(([k,l]) =>
    `<button class="${k===tab?'on':''}" onclick="setTab('${k}')">${l}</button>`).join('');
}

function renderCockpit(){
  const box = $('cockpit');
  if(layout!=='cockpit'){ box.style.display='none'; return; }
  box.style.display='block';
  const e = DATA.executive||{}, c = DATA.cashflow||{}, al = DATA.alerts||[];
  const crit = al.filter(a=>a.severity==='critical').length;
  const kpis = [
    ['Omset Hari Ini', rpJt(e.omset_today), (e.omset_today_vs_yest_pct!=null? (e.omset_today_vs_yest_pct<0?'▼':'▲')+' '+pctTxt(e.omset_today_vs_yest_pct)+'% vs kemarin':'')],
    ['Laba MTD', (e.est_profit_mtd!=null?rpJt(e.est_profit_mtd):'—'), (e.margin_pct!=null?'margin '+e.margin_pct+'%':'isi HPP dulu')],
    ['Saldo Kas', rpJt(c.balance), c.projected_negative?'perlu perhatian':'aman 30 hari'],
    ['Target Bulan', (e.achievement_pct??0)+'%', rpJt(e.omset_mtd)+' / '+rpJt(e.target_month)],
    ['Alert Aktif', String(al.length), crit?crit+' kritis':'tidak ada kritis'],
  ];
  $('cockpitGrid').innerHTML = kpis.map(k=>
    `<div class="kpi-dark"><div class="l">${k[0]}</div><div class="v">${k[1]}</div><div class="s">${k[2]}</div></div>`).join('');
}

function secHead(eyebrow, title){
  return `<div class="sec-head"><div class="eyebrow">${eyebrow}</div><h2 class="sec">${title}</h2></div>`;
}

function render(){
  const fn = {brief:vBrief, exec:vExec, market:vMarket, product:vProduct, ads:vAds,
    inv:vInv, cash:vCash, alert:vAlert, blueprint:vBlueprint}[tab];
  $('main').innerHTML = '<section>' + fn() + '</section>';
}

// ───────── A · Brief ─────────
function vBrief(){
  const b = DATA.brief||{}, al = DATA.alerts||[];
  const ctaMap = {roas:'ads',ad:'ads',stock:'inv',oos:'inv',low_stock:'inv',bestseller:'inv',
    channel:'market',omset:'exec',margin:'cash',cash:'cash'};
  const labelMap = {ads:'Buka Iklan',inv:'Buka Inventory',market:'Buka Marketplace',exec:'Buka Ringkasan',cash:'Buka Cashflow'};
  const prio = al.filter(a=>a.severity!=='info').slice(0,3).map((a,i)=>{
    let dest='exec'; for(const k in ctaMap){ if((a.type||'').includes(k)){ dest=ctaMap[k]; break; } }
    return `<div class="prio">
      <div class="num">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="t">${esc(a.title)}</div><div class="w">${esc(a.message)}</div>
      </div>
      <button class="cta" onclick="setTab('${dest}')">${labelMap[dest]||'Buka'} ›</button>
    </div>`;
  }).join('') || '<div class="card empty">Tidak ada prioritas mendesak hari ini. Pertahankan momentum.</div>';

  return `
    <div class="brief-hero"><div class="glow"></div><div style="position:relative">
      <div class="pill-dark">Brief Pagi · Auto-generated</div>
      <h1 class="fd">Ringkasan 5 menit untuk hari ini</h1>
      <div style="font-size:13px;color:#7a5a1e;font-weight:600">Data per ${esc((DATA.executive||{}).data_date||'-')}</div>
      <p class="brief-body">${esc(b.body||'Belum ada brief. Upload data lalu klik Refresh.')}</p>
    </div></div>
    <div style="margin-top:22px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px;font-weight:800;color:#101a33;letter-spacing:-.01em">Prioritas Hari Ini</span>
    </div>
    <div style="margin-top:12px;display:grid;gap:12px">${prio}</div>
    <div class="note-dark" style="margin-top:18px">
      <span>📩</span><span>Brief ini bisa dikirim otomatis ke WhatsApp/Telegram tiap pagi via <b style="color:#fff">N8N + AI Agent</b>.</span>
      <button class="btn-ghost" style="margin-left:auto;background:rgba(255,255,255,.12)" onclick="setTab('blueprint')">Lihat Blueprint ›</button>
    </div>`;
}

// ───────── B · Executive ─────────
function vExec(){
  const e = DATA.executive||{};
  const kpis = [
    {l:'Omset Hari Ini', v:rpJt(e.omset_today), s:'data terakhir', d:deltaChip(e.omset_today_vs_yest_pct), color:'#101a33'},
    {l:'Omset Kemarin', v:rpJt(e.omset_yesterday), s:'full day', color:'#101a33'},
    {l:'Omset Bulan Ini', v:rpJt(e.omset_mtd), s:'MTD', color:'#101a33'},
    {l:'Target Bulan', v:rpJt(e.target_month), s:(e.achievement_pct??0)+'% tercapai', color:'#101a33'},
    {l:'Estimasi Laba', v:(e.est_profit_mtd!=null?rpJt(e.est_profit_mtd):'Belum ada'), s:(e.margin_pct!=null?'margin '+e.margin_pct+'%':'isi HPP dulu'), color:'#1f9d4d', accent:true},
  ];
  const cards = kpis.map(k=>`
    <div class="${k.accent?'card-accent':'card'} kpi">
      <div class="l">${k.l}</div>
      <div class="v" style="color:${k.color}">${k.v}</div>
      <div class="row"><span class="s">${k.s}</span>${k.d||''}</div>
    </div>`).join('');
  const ach = e.achievement_pct||0;
  const remain = Math.max((e.target_month||0)-(e.omset_mtd||0),0);
  const progress = `
    <div class="card" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px">
        <div><div style="font-size:13px;color:var(--muted);font-weight:600">Pencapaian Target Bulan Ini</div>
          <div style="font-size:30px;font-weight:800;color:#101a33;letter-spacing:-.02em">${pctTxt(ach)}%</div></div>
        <div style="text-align:right;font-size:13px;color:var(--muted)">${rpJt(e.omset_mtd)} <span style="color:#cbb98e">/</span> ${rpJt(e.target_month)}<br>
          <span style="color:var(--gold-lbl);font-weight:700">Sisa ${rpJt(remain)}</span> menuju target</div>
      </div>
      <div style="margin-top:14px;height:14px;background:#f0e7d4;border-radius:999px;overflow:hidden">
        <div style="width:${Math.min(ach,100)}%;height:100%;background:linear-gradient(90deg,#FFB11D,#FD6212);border-radius:999px"></div>
      </div>
    </div>`;
  return secHead('Executive Summary','Performa Bulan Berjalan') +
    `<div class="gridfit" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr))">${cards}</div>` + progress;
}

// ───────── C · Marketplace ─────────
function vMarket(){
  const list = (DATA.channels||{}).channels||[];
  if(!list.length) return secHead('Marketplace Performance','Per Channel · Bulan Berjalan')+'<div class="card empty">Belum ada data penjualan.</div>';
  const cards = list.map(c=>{
    const col = CH_COLORS[c.channel]||'#888';
    return `<div class="card" style="border-top:4px solid ${col}">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:30px;height:30px;border-radius:9px;background:${col};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex:none">${CH_INITIAL[c.channel]||'?'}</div>
          <span style="font-weight:800;font-size:15.5px;color:#101a33">${esc(c.channel)}</span>
        </div>${deltaChip(c.growth_pct)}
      </div>
      <div style="margin-top:14px;font-size:24px;font-weight:800;color:#101a33;letter-spacing:-.02em">${rpJt(c.revenue)}</div>
      <div style="font-size:11.5px;color:var(--muted)">omset bulan berjalan</div>

// ───────── actions ─────────
async function refresh(){
  const b=$('refreshBtn'); b.textContent='…';
  try{ await fetch('/api/refresh',{method:'POST'}); await load(); toast('Diperbarui'); }
  catch(e){ toast('Gagal refresh'); }
  b.textContent='↻';
}
async function resetData(){
  if(!confirm('Hapus SEMUA data (termasuk data contoh) untuk mulai dengan data asli? Tidak bisa dibatalkan.')) return;
  try{ await fetch('/api/reset',{method:'POST'}); toast('Data dihapus. Silakan upload file asli.'); load(); }
  catch(e){ toast('Gagal reset'); }
}
async function upload(files){
  if(!files||!files.length) return;
  const ov=$('overlay'), t=$('ovTitle'), b=$('ovBody'), c=$('ovClose');
  ov.style.display='flex'; c.style.display='none';
  t.textContent='⏳ Memproses '+files.length+' file…';
  b.textContent='Mengunggah & menghitung. File "Semua Pesanan" isinya ribuan baris, jadi bisa 5–15 detik. Mohon tunggu, jangan tutup halaman.';
  const fd=new FormData(); for(const f of files) fd.append('file', f);
  try{
    const r=await fetch('/api/upload',{method:'POST',body:fd});
    const d=await r.json();
    const lines=(d.results||[]).map(x=> x.ok
      ? '✅ '+(x.filename||x.type)+'\n   → '+x.type+' ('+x.rows_imported+' baris)'+(x.note?'\n   '+x.note:'')
      : '❌ '+(x.filename||'?')+'\n   → '+(x.error||'gagal dibaca'));
    t.textContent=d.ok? '✅ Selesai diproses' : '⚠️ Sebagian/semua gagal';
    b.textContent=lines.join('\n\n')+'\n\nKlik tombol di bawah untuk lihat dashboard.';
    c.style.display='inline-block';
    load();
  }catch(e){
    t.textContent='❌ Gagal upload';
    b.textContent='Terjadi error: '+e+'\n\nCoba lagi, atau cek tab Logs di Render.';
    c.style.display='inline-block';
  }
}
$('file').addEventListener('change', e=>upload(e.target.files));

setLayout('brief');
load();
setInterval(load, 120000);
</script>
</body>
</html>
